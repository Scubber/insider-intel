# Runs inside the dev container — no host toolchain needed:
#   make precommit
# (Optionally `pre-commit install` on the host if you have pre-commit there.)
# detect-secrets over gitleaks: pip-installable, so it works in the Python dev
# image without pulling a Go toolchain.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: mixed-line-ending # WSL/Windows CRLF guard
        args: [--fix=lf]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
