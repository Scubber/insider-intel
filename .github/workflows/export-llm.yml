name: export-llm

# Read-mostly: build an LLM-ready export (raw document text + light metadata)
# from the live corpus and write it to the bucket's export/ prefix, so it can be
# pulled down for off-site LLM enrichment. Only cases that actually carry a
# document body (clean_text >= min_body) are included — metadata stubs are
# useless to an LLM. No corpus mutation of processed/, no LLM spend here.
on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Channel to export: filings | news | social | publications | all"
        required: false
        default: "filings"
      min_body:
        description: "Minimum clean_text length to include (chars)"
        required: false
        default: "1500"
      include_ours:
        description: "Also include our ai_summary / forensics / case_record"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: insider-intel-502413
  BUCKET: gs://insider-intel-502413-corpus
  OBJ: gs://insider-intel-502413-corpus/processed/articles.jsonl

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/698664056335/locations/global/workloadIdentityPools/github/providers/github-oidc # pragma: allowlist secret
          service_account: github-deployer@insider-intel-502413.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Build LLM export and write to export/ prefix
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
          MIN_BODY: ${{ github.event.inputs.min_body }}
          INCLUDE_OURS: ${{ github.event.inputs.include_ours }}
        run: |
          set -euo pipefail
          gcloud storage cp "${OBJ}" corpus.jsonl
          CH="${CHANNEL:-filings}"
          MIN="${MIN_BODY:-1500}"
          OURS="${INCLUDE_OURS:-false}"

          jq -c --arg ch "$CH" --argjson min "$MIN" --argjson ours "$OURS" '
            select($ch == "all"
                   or .channel == $ch
                   or ($ch == "filings" and ((.source_id // "") | test("courtlistener"; "i"))))
            | select((.clean_text // "" | length) >= $min)
            | {
                link, title,
                court: .source_name,
                published, channel,
                use_cases: (.use_cases // []),
                insider_type,
                itm_ids: [ (.entities.itm_hits // [])[].id ],
                text: .clean_text
              }
              + (if $ours then {ai_summary, forensics, case_record} else {} end)
          ' corpus.jsonl > export.ndjson || true

          COUNT=$(wc -l < export.ndjson | tr -d ' ')
          BYTES=$(wc -c < export.ndjson | tr -d ' ')
          echo "exported ${COUNT} row(s) for channel=${CH} min_body=${MIN} include_ours=${OURS} (${BYTES} bytes)"
          if [ "${COUNT}" -eq 0 ]; then
            echo "Nothing matched — no body-bearing rows for this channel yet." >&2
          fi

          DEST_LATEST="${BUCKET}/export/insider-${CH}-llm.ndjson"
          gcloud storage cp export.ndjson "${DEST_LATEST}"
          echo "----------------------------------------------------------------"
          echo "Pull it down with:"
          echo "  gcloud storage cp ${DEST_LATEST} ."
          echo "----------------------------------------------------------------"
