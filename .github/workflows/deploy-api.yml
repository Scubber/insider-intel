name: deploy-api

# Keyless CD: GitHub OIDC → Workload Identity Federation → github-deployer SA.
# Builds the runtime image (corpus-free; the service mounts the GCS bucket)
# and rolls the Cloud Run service + refresh job to it.
on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "shared/**"
      - "pyproject.toml"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: insider-intel-502413
  REGION: us-east1
  IMAGE: us-east1-docker.pkg.dev/insider-intel-502413/insider-intel/insider-intel-api

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/698664056335/locations/global/workloadIdentityPools/github/providers/github-oidc # pragma: allowlist secret
          service_account: github-deployer@insider-intel-502413.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      - name: Build and push image
        run: |
          gcloud auth configure-docker ${REGION}-docker.pkg.dev -q
          docker build -t "${IMAGE}:${GITHUB_SHA::7}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${GITHUB_SHA::7}"
          docker push "${IMAGE}:latest"
      - name: Deploy API service
        run: |
          gcloud run deploy insider-intel-api \
            --image "${IMAGE}:${GITHUB_SHA::7}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}"
      - name: Roll refresh job to same image
        # Re-assert the ingest config here (GitOps: repo is the source of truth).
        # --update-env-vars merges, so the API keys/secret mappings on the job are
        # preserved. Change models/providers by editing this line + merging — no
        # manual gcloud. The `^##^` prefix sets `##` as the pair delimiter so the
        # comma-separated provider *chains* survive.
        #  - SUMMARIZER_LLM_PROVIDER: ordered enrichment fallback chain; each is
        #    tried until one succeeds, and any provider without a key is skipped,
        #    so unfunded entries are harmless. Order: anthropic > openai > sol >
        #    gemini > xai. Each needs its key mapped to the job (Secret Manager).
        #    `sol` is defined in LLM_CUSTOM_PROVIDERS below as a custom
        #    OpenAI-compatible endpoint reusing OPENAI_API_KEY (no new secret).
        #  - Models are per-provider in a mixed chain: SUMMARIZER_MODEL is
        #    asserted EMPTY because that role-level override only hits the
        #    chain's first named provider (anthropic) — a stale gpt-4o value
        #    there would poison the Anthropic link and silently drop the openai
        #    fallback to its mini default. OPENAI_COMPAT_MODEL=gpt-4o pins the
        #    openai link; anthropic uses ANTHROPIC_MODEL (job env / default),
        #    sol comes from LLM_CUSTOM_PROVIDERS, gemini/xai use their defaults.
        #  - Cap 100/run + 45m timeout: filings enrich at full document length
        #    (~15-25s/call), so a filings-heavy sweep can pass 30 min; a timeout
        #    triggers a Cloud Run task RETRY that re-bills whatever wasn't yet
        #    checkpointed. The backfill checkpoints every 5 conversions, but the
        #    timeout should still comfortably cover one full sweep.
        #  - BACKFILL_RESERVE=60: the fresh-news batch may spend at most 40 of
        #    the 100; 60+ is guaranteed to the filings-first backlog sweep.
        #    Drop toward the library default (6) once the backlog is converted.
        # Discovery (second call per case, doubles spend) inherits the enrichment
        # chain by default — asserted explicitly below with its own cap
        # (DISCOVERER_MAX_ARTICLES_PER_RUN=0 turns it off).
        run: |
          gcloud run jobs update corpus-refresh \
            --image "${IMAGE}:${GITHUB_SHA::7}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --task-timeout=45m \
            --update-env-vars '^##^SUMMARIZER_LLM_PROVIDER=anthropic,openai,sol,gemini,xai##SUMMARIZER_MODEL=##OPENAI_COMPAT_MODEL=gpt-4o##SUMMARIZER_MAX_ARTICLES_PER_RUN=100##SUMMARIZER_BACKFILL_RESERVE=60##DISCOVERER_LLM_PROVIDER=anthropic,openai,sol,gemini,xai##DISCOVERER_MAX_ARTICLES_PER_RUN=15##LLM_CUSTOM_PROVIDERS={"sol":{"base_url":"https://api.openai.com/v1","model":"gpt-5.6-sol","api_key_env":"OPENAI_API_KEY"}}'
      - name: Smoke test
        run: |
          URL=$(gcloud run services describe insider-intel-api --region "${REGION}" --format='value(status.url)')
          curl -sf "${URL}/health" >/dev/null && echo "health OK"
          curl -sf "${URL}/articles?limit=1" >/dev/null && echo "articles OK"
          curl -sf "${URL}/social/catalog" >/dev/null && echo "social catalog OK"
          # subscription write path round-trip (catches read-only mount regressions)
          curl -sf -X POST "${URL}/social/subscriptions" \
            -H 'Content-Type: application/json' \
            -d '{"platform":"reddit","id":"deploy-smoke-probe"}' >/dev/null
          curl -sf -X DELETE "${URL}/social/subscriptions/reddit/deploy-smoke-probe" >/dev/null
          echo "subscription round-trip OK"
          # extract endpoint assembles stored forensics — no LLM at read time.
          # An unindexed link short-circuits early (mode=seeds, count=0).
          EXTRACT=$(curl -sf -X POST "${URL}/extract/ttps" \
            -H 'Content-Type: application/json' \
            -d '{"links":["https://example.invalid/deploy-smoke-probe"]}')
          echo "${EXTRACT}" | grep -q '"mode":"seeds"'
          echo "${EXTRACT}" | grep -q '"article_count":0'
          echo "extract smoke OK"
          curl -sf "${URL}/articles?channel=publications&itm_alignment=all&limit=1" >/dev/null \
            && echo "publications facet OK"
          # ingest_url negative path: unresolvable host must map to a clean
          # 4xx/5xx error, never hang or 200 (no real ingestion per deploy).
          PUB_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST "${URL}/publications/ingest_url" \
            -H 'Content-Type: application/json' \
            -d '{"url":"https://example.invalid/deploy-smoke-probe"}')
          case "${PUB_CODE}" in
            400|404|502|503) echo "publications ingest_url smoke OK (${PUB_CODE})" ;;
            *) echo "unexpected publications ingest_url status ${PUB_CODE}" >&2; exit 1 ;;
          esac
