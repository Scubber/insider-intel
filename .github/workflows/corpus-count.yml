name: corpus-count

# Read-only: download the live corpus and count how many filings a re-enrich
# drain would re-bill (stale model / old clamp schema). No Cloud Run job
# mutation, no LLM spend — just a JSONL scan in the runner.
on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: insider-intel-502413
  OBJ: gs://insider-intel-502413-corpus/processed/articles.jsonl

jobs:
  count:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/698664056335/locations/global/workloadIdentityPools/github/providers/github-oidc # pragma: allowlist secret
          service_account: github-deployer@insider-intel-502413.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Count stale filings
        run: |
          set -euo pipefail
          gcloud storage cp "${OBJ}" corpus.jsonl
          wc -l corpus.jsonl
          python3 scripts/count_stale_filings.py corpus.jsonl --target claude-sonnet-5 --schema 2
