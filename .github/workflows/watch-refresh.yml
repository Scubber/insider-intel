name: watch-refresh

# Read-only progress gauge for the corpus-refresh job: latest execution
# states plus a live "N enriched of cap" count from Cloud Logging. Dispatch
# it any time — it never executes the job, so it spends nothing.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: insider-intel-502413
  REGION: us-east1

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/698664056335/locations/global/workloadIdentityPools/github/providers/github-oidc # pragma: allowlist secret
          service_account: github-deployer@insider-intel-502413.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      - name: Recent executions
        run: |
          gcloud run jobs executions list --job corpus-refresh \
            --region "${REGION}" --project "${PROJECT_ID}" --limit 3 \
            --format 'table(name,status.startTime,status.completionTime,status.succeededCount,status.failedCount,status.retriedCount)'
      - name: Enrichment progress (last 90 min)
        run: |
          LOGS=$(gcloud logging read "resource.labels.job_name=corpus-refresh" \
            --project "${PROJECT_ID}" --freshness=90m \
            --format='value(textPayload)' || true)
          TOTAL=$(printf '%s\n' "$LOGS" | grep -c 'Case enriched' || true)
          echo "=== Case-enriched lines in window: ${TOTAL} (job cap: 100/run) ==="
          printf '%s\n' "$LOGS" \
            | grep -iE 'Case enriched|Backfill checkpoint|Backfilled forensic|Processing complete|reloaded|\[OK\]|\[FAIL\]' \
            | head -60 || true
