name: ci

# CI runs the SAME Makefile targets as local dev, inside the same dev image,
# against the same compose Postgres sidecar — green locally means green here.
on:
  push:
    paths:
      - "apps/**"
      - "shared/**"
      - "tests/**"
      - "pyproject.toml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "Makefile"
      - ".dockerignore"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "apps/**"
      - "shared/**"
      - "tests/**"
      - "pyproject.toml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "Makefile"
      - ".dockerignore"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Build dev image
        run: make build
      - name: Lint
        run: make lint
      - name: Test (against Postgres sidecar)
        run: make test
