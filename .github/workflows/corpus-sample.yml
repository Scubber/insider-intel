name: corpus-sample

# Read-only: download the live corpus and print a few real enriched filings —
# their extracted methods (action/tools/quantity/claim_status) and the typed
# CaseObservables (channel + artifact/log-source). No mutation, no LLM spend;
# just a jq view for eyeballing what the enricher actually captured.
on:
  workflow_dispatch:
    inputs:
      max_cases:
        description: "How many example filings to print"
        required: false
        default: "5"

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: insider-intel-502413
  OBJ: gs://insider-intel-502413-corpus/processed/articles.jsonl

jobs:
  sample:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/698664056335/locations/global/workloadIdentityPools/github/providers/github-oidc # pragma: allowlist secret
          service_account: github-deployer@insider-intel-502413.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Sample enriched filings with observables
        env:
          MAX_CASES: ${{ github.event.inputs.max_cases }}
        run: |
          set -euo pipefail
          gcloud storage cp "${OBJ}" corpus.jsonl
          echo "filings with >=1 observable:"
          jq -c 'select((.channel=="filings") and ((.forensics.methods // [] | map(.observables // [] | length) | add) // 0) > 0)' \
            corpus.jsonl | wc -l
          echo "----- examples -----"
          jq -r --argjson n "${MAX_CASES:-5}" '
            select((.channel=="filings")
              and ((.forensics.methods // [] | map(.observables // [] | length) | add) // 0) > 0)
          ' corpus.jsonl \
          | jq -sr --argjson n "${MAX_CASES:-5}" '
            .[:$n][]
            | "CASE: \(.title)\n  model: \(.forensics.model // "-")\n"
              + ([ .forensics.methods[]
                   | "  ACTION: \(.action)"
                     + "  | tools: \((.tools // []) | join(", "))"
                     + "  | data: \(.target_data // "-")"
                     + "  | qty: \(.quantity // "-")"
                     + "  | status: \(.claim_status)"
                     + ( [ (.observables // [])[]
                           | "\n      OBS [\(.channel)] artifact=\(.artifact // "-") basis=\(.basis // "-")\n        \(.description)" ]
                         | join("") )
                 ] | join("\n"))
              + "\n"
          '
